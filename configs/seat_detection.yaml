# seat_detection.yaml
path: E:\Libseat_system\computer_vision\data\processed  # 你的数据集根目录绝对路径
train: train/images  # 训练集路径（相对于 path 目录）
val: val/images      # 验证集路径（相对于 path 目录）
test: test/images
# 类别数量 (nc)
nc: 2  # 根据你的数据集定义修改。例如：1类('seat') 或 2类('occupied_seat', 'empty_seat')

# 类别名称 (names)，顺序与标注时的 class_id 对应
names: ['occupied_seat', 'empty_seat']  # 请替换为你的实际类别名